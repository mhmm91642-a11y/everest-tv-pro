<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيفرست برو - عرض الباقات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #0d0d0d; }
        .packages-container { background-color: #0d0d0d; padding: 15px; font-family: 'Cairo', sans-serif; direction: rtl; }
        .packages-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1200px; margin: 0 auto; }
        .package-card { background-color: #1a1a1a; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); border: 1px solid #222; transition: transform 0.3s ease; }
        .package-card:hover { transform: translateY(-5px); }
        .image-container { position: relative; width: 100%; padding-top: 100%; background-color: #111; }
        .image-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .discount-badge { position: absolute; top: 8px; right: 8px; background-color: rgba(45, 45, 45, 0.85); color: #fff; padding: 4px 8px; font-size: 11px; border-radius: 4px; z-index: 2; font-weight: 500; }
        .card-body { padding: 12px; text-align: center; flex-grow: 1; }
        .package-title { font-size: 14px; font-weight: 500; margin: 0 0 8px 0; color: #e0e0e0; line-height: 1.4; }
        .price-container { display: flex; justify-content: center; align-items: center; gap: 8px; flex-wrap: wrap; }
        .current-price { color: #ff4a5a; font-weight: bold; font-size: 15px; }
        .old-price { color: #777; text-decoration: line-through; font-size: 12px; }
        .card-actions { display: flex; border-top: 1px solid #2d2d2d; }
        .order-now-link { flex: 3; background-color: #dfb664; color: #111; text-decoration: none; padding: 12px 8px; font-weight: bold; font-size: 13px; text-align: center; cursor: pointer; border: none; }
        .view-btn { flex: 1; background-color: #dfb664; color: #111; border: none; border-right: 1px solid rgba(0, 0, 0, 0.1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        @media (min-width: 768px) { .packages-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
    </style>
</head>
<body>

<div class="packages-container">
    <div class="packages-grid">
        <!-- الباقة 1 -->
        <div class="package-card">
            <div class="image-container">
                <span class="discount-badge">وفر 44%</span>
                <img src="https://via.placeholder.com/400x400/1a1a1a/dfb664?text=Falcon+1+Year" alt="اشتراك فالكون سنة">
            </div>
            <div class="card-body">
                <h3 class="package-title">اشتراك فالكون سنة</h3>
                <div class="price-container">
                    <span class="current-price">195.00 ر.س</span>
                    <span class="old-price">450.00 ر.س</span>
                </div>
            </div>
            <div class="card-actions">
                <a href="https://wa.me/YOUR_NUMBER?text=مرحباً، أريد طلب اشتراك فالكون سنة" class="order-now-link">اطلب الآن</a>
                <button class="view-btn">👁️</button>
            </div>
        </div>

        <!-- الباقة 2 -->
        <div class="package-card">
            <div class="image-container">
                <span class="discount-badge">وفر 30%</span>
                <img src="https://via.placeholder.com/400x400/1a1a1a/dfb664?text=Falcon+6+Months" alt="اشتراك فالكون 6 أشهر">
            </div>
            <div class="card-body">
                <h3 class="package-title">اشتراك فالكون 6 أشهر</h3>
                <div class="price-container">
                    <span class="current-price">120.00 ر.س</span>
                    <span class="old-price">180.00 ر.س</span>
                </div>
            </div>
            <div class="card-actions">
                <a href="https://wa.me/YOUR_NUMBER?text=مرحباً، أريد طلب اشتراك فالكون 6 أشهر" class="order-now-link">اطلب الآن</a>
                <button class="view-btn">👁️</button>
            </div>
        </div>

        <!-- الباقة 3 -->
        <div class="package-card">
            <div class="image-container">
                <span class="discount-badge">وفر 50%</span>
                <img src="https://via.placeholder.com/400x400/1a1a1a/dfb664?text=Everest+VIP" alt="اشتراك إيفرست VIP">
            </div>
            <div class="card-body">
                <h3 class="package-title">اشتراك إيفرست VIP سنة</h3>
                <div class="price-container">
                    <span class="current-price">250.00 ر.س</span>
                    <span class="old-price">500.00 ر.س</span>
                </div>
            </div>
            <div class="card-actions">
                <a href="https://wa.me/YOUR_NUMBER?text=مرحباً، أريد طلب اشتراك إيفرست VIP سنة" class="order-now-link">اطلب الآن</a>
                <button class="view-btn">👁️</button>
            </div>
        </div>

        <!-- الباقة 4 -->
        <div class="package-card">
            <div class="image-container">
                <span class="discount-badge">وفر 20%</span>
                <img src="https://via.placeholder.com/400x400/1a1a1a/dfb664?text=Basic+Pack" alt="الباقة الأساسية">
            </div>
            <div class="card-body">
                <h3 class="package-title">الباقة الأساسية 3 أشهر</h3>
                <div class="price-container">
                    <span class="current-price">80.00 ر.س</span>
                    <span class="old-price">100.00 ر.س</span>
                </div>
            </div>
            <div class="card-actions">
                <a href="https://wa.me/YOUR_NUMBER?text=مرحباً، أريد طلب الباقة الأساسية 3 أشهر" class="order-now-link">اطلب الآن</a>
                <button class="view-btn">👁️</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
